<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Check</title>
<style>
body{
font-family:Arial,sans-serif;
max-width:1000px;
margin:auto;
padding:20px;
}
textarea{
width:100%;
height:400px;
padding:10px;
}
button{
padding:12px 25px;
font-size:18px;
margin-top:10px;
cursor:pointer;
}
#result{
margin-top:20px;
white-space:pre-wrap;
background:#f4f4f4;
padding:15px;
border-radius:10px;
}
</style>
</head>
<body>
<h1>☕ Coffee Check</h1>
<p>Вставь весь учёт (БЫЛО + ОСТАЛОСЬ):</p>
<textarea id="input"></textarea>
<br>
<button onclick="calculate()">Посчитать</button>
<div id="result"></div>
<script>
function getValue(text, name){

let lines = text.split("\n");

for(let line of lines){

if(line.toLowerCase().includes(name.toLowerCase())){

let base = 0;

// базовое число
let baseMatch = line.match(/[-–]\s*(\d+)/);
if(baseMatch) base = parseInt(baseMatch[1]);

// все + и -
let ops = line.match(/[+-]\d+/g);

if(ops){
ops.forEach(op=>{
base += parseInt(op);
});
}

return base;

}

}

return 0;

}
function calculate(){
let text = document.getElementById("input").value;
let parts = text.split("ОСТАЛОСЬ");
if(parts.length < 2){
document.getElementById("result").innerText =
"Не найден раздел ОСТАЛОСЬ";
return;
}
let start = parts[0];
let end = parts[1];
let items = [
["450","450"],
["350","350"],
["250","250"],
["Л","Л"],
["Макаронс","Макаронс"],
["Печенья чанки","Чанки"],
["Пончики","Пончики"],
["Моти","Моти"],
["Трайфл","Трайфл"],
["Бореки","Бореки"],
["Орешки классика","Орешки классика"],
["Орешки с орехом","Орешки с орехом"],
["Вафли","Вафли"],
["Боул","Боул"],
["Тост","Тост"],
["Шницель","Шницель"],
["Японский","Японский"],
["Чизкейк","Чизкейк"],
["Фанта","Фанта"],
["Спрайт","Спрайт"],
["Кола","Кола"],
["Сок дет","Сок дет"]
];
let result = "Продано:\n\n";
items.forEach(item=>{
let before = getValue(start,item[0]);
let after = getValue(end,item[0]);
let sold = before-after;
if(sold>0){
result += item[1] + "-" + sold + "\n";
}
});
document.getElementById("result").innerText=result;
}
</script>
</body>
</html>
