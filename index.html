<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Check</title>
<style>
body{
    font-family: Arial, sans-serif;
    max-width:900px;
    margin:40px auto;
    padding:20px;
}
textarea{
    width:100%;
    height:300px;
}
button{
    padding:10px 20px;
    font-size:16px;
    margin-top:10px;
}
#result{
    margin-top:20px;
    white-space:pre-wrap;
    background:#f5f5f5;
    padding:15px;
}
</style>
</head>
<body>
<h1>☕ Coffee Check</h1>
<p>Вставь учёт сюда:</p>
<textarea id="input"></textarea>
<br>
<button onclick="calculate()">Посчитать</button>
<div id="result"></div>
<script>
function calculate() {
    document.getElementById("result").innerHTML =
    "Первая версия сайта работает 🎉<br><br>Дальше будем добавлять автоматический подсчёт учёта и сверку с Палома.";
}
</script>
</body>
</html>
